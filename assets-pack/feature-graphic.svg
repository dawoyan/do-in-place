<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0F2557"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pin-grad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle map grid -->
  <line x1="0"    y1="125" x2="480" y2="125" stroke="#1E3A5F" stroke-width="0.8" opacity="0.6"/>
  <line x1="0"    y1="250" x2="480" y2="250" stroke="#1E3A5F" stroke-width="0.8" opacity="0.6"/>
  <line x1="0"    y1="375" x2="480" y2="375" stroke="#1E3A5F" stroke-width="0.8" opacity="0.6"/>
  <line x1="120"  y1="0"   x2="120" y2="500" stroke="#1E3A5F" stroke-width="0.8" opacity="0.6"/>
  <line x1="240"  y1="0"   x2="240" y2="500" stroke="#1E3A5F" stroke-width="0.8" opacity="0.6"/>
  <line x1="360"  y1="0"   x2="360" y2="500" stroke="#1E3A5F" stroke-width="0.8" opacity="0.6"/>

  <!-- Divider between left and right halves -->
  <line x1="500" y1="40" x2="500" y2="460" stroke="#1E3A5F" stroke-width="1" opacity="0.5"/>

  <!-- Pin glow blob -->
  <ellipse cx="240" cy="230" rx="220" ry="200" fill="url(#glow)"/>

  <!-- Pin drop shadow -->
  <path fill="#1E3A8A" opacity="0.3" d="
    M 248 68
    C 180 68, 130 120, 130 188
    C 130 280, 248 438, 248 438
    C 248 438, 366 280, 366 188
    C 366 120, 316 68, 248 68 Z
  "/>

  <!-- Main white pin -->
  <path fill="url(#pin-grad)" d="
    M 240 58
    C 172 58, 122 110, 122 178
    C 122 270, 240 432, 240 432
    C 240 432, 358 270, 358 178
    C 358 110, 308 58, 240 58 Z
  "/>

  <!-- Inner blue circle -->
  <circle cx="240" cy="178" r="62" fill="#2563EB"/>

  <!-- White checkmark -->
  <path d="M 208 178 L 230 202 L 278 152"
        stroke="white" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Ripple rings under pin point -->
  <circle cx="240" cy="432" r="18" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
  <circle cx="240" cy="432" r="34" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
  <circle cx="240" cy="432" r="50" fill="none" stroke="#2563EB" stroke-width="0.5" opacity="0.15"/>

  <!-- ── RIGHT SIDE TEXT ── -->

  <!-- App name -->
  <text x="540" y="196"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="800"
        fill="#FFFFFF" letter-spacing="-2">Do In Place</text>

  <!-- Tagline -->
  <text x="540" y="244"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400"
        fill="#10B981" letter-spacing="0.2">Reminders that trigger when you arrive</text>

  <!-- Divider under tagline -->
  <line x1="540" y1="272" x2="990" y2="272" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Feature bullets -->
  <circle cx="554" cy="308" r="5" fill="#2563EB"/>
  <text x="572" y="315"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="19" fill="#94A3B8">Pin tasks to exact places — not time slots</text>

  <circle cx="554" cy="354" r="5" fill="#2563EB"/>
  <text x="572" y="361"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="19" fill="#94A3B8">Shopping lists that learn your store layout</text>

  <circle cx="554" cy="400" r="5" fill="#2563EB"/>
  <text x="572" y="407"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="19" fill="#94A3B8">Share tasks with family and contacts</text>
</svg>
